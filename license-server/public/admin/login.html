<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NetClaw 控制台 · 登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E🐾%3C/text%3E%3C/svg%3E" />
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center font-sans">
  <main class="w-full max-w-sm px-6">
    <header class="text-center mb-8">
      <div class="text-4xl mb-2">🐾</div>
      <h1 class="text-2xl font-semibold text-slate-900">NetClaw 控制台</h1>
      <p class="text-sm text-slate-500 mt-1">License 管理 · 多租户</p>
    </header>

    <form id="login-form" class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">用户名</label>
        <input id="username" type="text" autocomplete="username" required
          class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">密码</label>
        <input id="password" type="password" autocomplete="current-password" required
          class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
      </div>

      <div id="error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-md px-3 py-2"></div>

      <button id="submit" type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-md transition disabled:opacity-50 disabled:cursor-not-allowed">
        登录
      </button>
    </form>

    <p class="text-center text-xs text-slate-400 mt-6">
      &copy; NetClaw · 仅限授权管理员使用
    </p>
  </main>

  <script src="js/login.js"></script>
</body>
</html>
